      - heading "Mozilla Open Source Support Awards" [level=1] [ref=e19]
      - paragraph [ref=e22]: Mozilla was born out of and remains part of the open source and free software movement. Through the Mozilla Open Source Support (MOSS) awards program, we recognize, celebrate, and support open source projects that contribute to Mozilla’s work and to the health of the Internet. MOSS broadens access, increases security, and empowers users by providing catalytic funding to open source technologists.
