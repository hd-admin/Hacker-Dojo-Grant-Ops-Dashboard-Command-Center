          - text: As a result of the
          - link "2020 restructuring at Mozilla" [ref=e27] [cursor=pointer]:
            - /url: https://blog.mozilla.org/blog/2020/08/11/changing-world-changing-mozilla/
          - text: ", the MOSS program is on indefinite hiatus and is not currently accepting applications. For current funding opportunities for open source projects, please see"
          - link "the Mozilla Technology Fund" [ref=e28] [cursor=pointer]:
