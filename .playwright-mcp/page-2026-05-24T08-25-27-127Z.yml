      - generic [ref=e112]:
        - generic [ref=e113]:
          - heading "About MOSS" [level=2] [ref=e114]
          - paragraph [ref=e115]: MOSS is an awards program of Mozilla Corporation, which is ultimately responsible for selecting and funding final award recipients. MOSS is administered in part by Mozilla Foundation, the nonprofit owner of the Mozilla Corporation.
        - generic [ref=e116]:
          - heading "Frequently Asked Questions" [level=2] [ref=e117]
          - generic [ref=e118]:
            - term [ref=e119]: When is the application deadline?
            - definition [ref=e120]:
              - paragraph [ref=e121]: MOSS applications are accepted on a rolling basis and are reviewed monthly. Depending on when your application is received in our review cycle, it may take up to two months to receive committee feedback.
            - term [ref=e122]: What is the range of award amounts that the committee usually provides?
            - definition [ref=e123]:
              - paragraph [ref=e124]: While there is no set range, historically, the MOSS Committee has mostly chosen to award between $5,000 and $150,000 USD per project; the average project size is roughly $70,000 USD. Awards of $150,000 and greater have historically been approved mostly for return awardees who have already successfully completed a smaller MOSS project. In general, the larger the award, the more scrutiny the application will receive and the more questions the committee will have regarding how the money will be used. All projects should include a statement of work that helps the committee understand how the amount of funding requested was determined and how that funding maps to specific tasks.
            - term [ref=e125]: How mature does a project need to be in order to apply for a MOSS award?
            - definition [ref=e126]:
              - paragraph [ref=e127]:
                - text: Historically, the MOSS Committee has chosen to fund projects which are important in their ecosystems and can demonstrate some success and momentum with regard to acquiring users and building an active community of contributors. Unfortunately, the MOSS Committee does not consider applications from brand new projects, projects which are not open source, projects which have yet to be built or projects which have yet to build a community of users and contributors. If you are unsure if your project qualifies for MOSS funding, please
                - link "email the MOSS team" [ref=e128] [cursor=pointer]:
                  - /url: mailto:MOSS@mozilla.com
                - text: .
            - term [ref=e129]: What types of open source projects does the committee fund?
            - definition [ref=e130]:
              - paragraph [ref=e131]: The MOSS Committee is happy to consider any open source project, including but not limited to software, hardware, firmware, design, and networking projects. All projects must generally involve some amount of technical development. MOSS does not sponsor conferences and events.
            - term [ref=e132]: How should I determine what size of an award to apply for?
            - definition [ref=e133]:
              - paragraph [ref=e134]: The award amount you request should be determined by the scope of work that you wish to complete using your MOSS award. Your application should contain a rough scope of work, including an expected number of hours and hourly rates to complete each task.
            - term [ref=e135]: What licenses are accepted?
            - definition [ref=e136]:
              - paragraph [ref=e137]:
                - text: The MOSS committee will only consider projects which are released publicly under a license that is either a free software license according to the
                - link "FSF" [ref=e138] [cursor=pointer]:
                  - /url: https://www.fsf.org/
                - text: or an open source license according to the
                - link "OSI" [ref=e139] [cursor=pointer]:
                  - /url: https://opensource.org/
                - text: . Projects which are not licensed for use under an open source license are not eligible for MOSS funding.
            - term [ref=e140]: Can I include indirect costs in my budget?
            - definition [ref=e141]:
              - paragraph [ref=e142]: The MOSS committee prefers to fund direct project costs, but we recognize that recovery of indirect costs may be a necessity.
              - list [ref=e143]:
                - listitem [ref=e144]: Organizations may charge up to 10% of direct costs.
                - listitem [ref=e145]: Ten percent is a maximum. If an applicant’s actual indirect cost rate is lower, the actual rate should be proposed in the budget.
                - listitem [ref=e146]: Mozilla may request substantiation of any applicant’s indirect cost rate.
                - listitem [ref=e147]: Individual applicants should not include indirect costs in their budget.
            - term [ref=e148]: What are indirect and direct costs?
            - definition [ref=e149]:
              - paragraph [ref=e150]: Direct costs are expenses directly attributable to the scope of work described in your request. Generally, direct costs would not be incurred if the proposed scope of work did not exist. Direct costs may include staff salaries, contractors/consultants, and materials required to execute the scope of work.
              - paragraph [ref=e151]: Indirect costs are those costs not readily identified with a specific project/activity but incurred for the joint benefit of multiple projects/activities. Indirect costs are usually grouped into common pools and charged to benefiting objectives through an allocation process/indirect cost rate. Indirect costs include expenses frequently referred to as overhead (rent, utilities, general and administrative expenses, etc.)
            - term [ref=e152]: Can I request additional funds after a final decision is made on my request?
            - definition [ref=e153]:
              - paragraph [ref=e154]: MOSS committee decisions are final. We cannot increase award amounts after a decision has been made. Should you need to revise your scope of work, please contact the MOSS program officer immediately.
            - term [ref=e155]: Who can apply to MOSS?
            - definition [ref=e156]:
              - paragraph [ref=e157]:
                - text: Generally anyone who maintains an open source project can apply to MOSS, including individuals, NGOs, and for-profit companies. Individuals and entities on the SDN list, other sanctions lists, or who Mozilla is otherwise legally prohibited from engaging are not eligible to receive funding from MOSS. Individuals with a documented violation of
                - link "Mozilla’s Community Participation Guidelines" [ref=e158] [cursor=pointer]:
                  - /url: /en-US/about/governance/policies/participation/
                - text: may not be eligible to receive funding from MOSS.
            - term [ref=e159]: For Track I, what are you looking for in the reference letter from a Mozilla Champion?
            - definition [ref=e160]:
              - paragraph [ref=e161]: For Track I (Foundational Technologies) projects, your application should include an endorsement from a Mozilla Champion who can describe how your project is used by Mozilla and why it is an important dependency for our work.
            - term [ref=e162]: What about taxes?
            - definition [ref=e163]:
              - paragraph [ref=e164]: Recipients are responsible for determining the tax implications of receiving an award, based on their respective countries’ tax laws and compliance requirements. Amounts applied for should be sized such that any tax or other liability that will be incurred is accounted for. Mozilla reserves the right to use different payment mechanisms or tax characterizations for different awards in the MOSS program based on a number of factors specific to each award.
            - term [ref=e165]: Can you share an example Schedule of Work (SoW) for a past MOSS project?
            - definition [ref=e166]:
              - paragraph [ref=e167]:
                - text: A Schedule of Work sample can be found
                - link "here" [ref=e168] [cursor=pointer]:
                  - /url: https://wiki.mozilla.org/images/3/3c/Kea-sow.pdf
                - text: .
            - term [ref=e169]: How can I learn more about MOSS? Is there someone I can talk to about my project idea?
            - definition [ref=e170]:
              - paragraph [ref=e171]:
                - text: We would love to talk to you about your project idea or answer any questions you may have about MOSS. To reach the MOSS project team, please contact us at
                - link "MOSS@mozilla.com" [ref=e172] [cursor=pointer]:
                  - /url: mailto:MOSS@mozilla.com
                - text: .
