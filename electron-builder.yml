appId: com.hackerdojo.grant-ops
productName: HackerDojoGrantOps
directories:
  output: release
  buildResources: build
files:
  - dist-electron/**/*
  - frontend/.next/standalone/**/*
  - frontend/.next/static/**/*
  - package.json
extraResources:
  - from: assets/icon.png
    to: icon.png
win:
  target:
    - nsis
  icon: assets/icon.png
mac:
  target:
    - dmg
    - zip
  icon: assets/icon.png
  category: public.app-category.productivity
linux:
  target:
    - AppImage
    - deb
  icon: assets/icon.png
  category: Office
publish:
  provider: github
  owner: hackerdojo
  repo: grant-app
